function formatMoney(price, currency) {
  const value = Number(price) || 0;
  const code = String(currency || 'EUR').toUpperCase();
  try {
    return new Intl.NumberFormat('ca-ES', { style: 'currency', currency: code, maximumFractionDigits: 0 }).format(value);
  } catch {
    return `${Math.round(value)} ${code}`;
  }
}

function TravelBasketStepDots({ step }) {
  const steps = [
    { id: 'flights', label: 'Vol' },
    { id: 'hotels', label: 'Hotel' },
    { id: 'summary', label: 'Resum' },
  ];
  const rawIndex = steps.findIndex((s) => s.id === step);
  const activeIndex = rawIndex >= 0 ? rawIndex : 0;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 14 }}>
      {steps.map((s, i) => {
        const done = activeIndex > i;
        const active = activeIndex === i;
        return (
          <React.Fragment key={s.id}>
            {i > 0 && (
              <div style={{ flex: '0 0 8px', height: 3, borderRadius: 2, background: activeIndex >= i ? 'var(--green)' : 'var(--border)' }}/>
            )}
            <div
              title={s.label}
              style={{
                flex: 1,
                padding: '8px 6px',
                borderRadius: 12,
                textAlign: 'center',
                fontSize: 11.5,
                fontWeight: active ? 800 : done ? 600 : 500,
                color: active ? '#fff' : done ? 'var(--green-deep)' : 'var(--text-muted)',
                background: active ? 'var(--text)' : done ? 'var(--green-subtle)' : 'var(--surface-2)',
                border: `1px solid ${active ? 'var(--text)' : 'var(--border)'}`,
              }}
            >
              {i + 1}. {s.label}
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

function LiveOffersPreview({ offerSnapshot, offerLoadError, offerLoading }) {
  const offers = offerSnapshot?.offers || [];
  const hotels = offers.filter((offer) => {
    const t = String(offer.type || '').toUpperCase();
    return t === 'HOTEL' || t === 'ACCOMMODATION';
  });
  const flights = offers.filter((offer) => String(offer.type || '').toUpperCase() === 'TRANSPORT');
  const isLoading = Boolean(offerLoading);
  const hasError = Boolean(offerLoadError);

  const [currentStep, setCurrentStep] = React.useState('flights');
  const [selectedFlight, setSelectedFlight] = React.useState(null);
  const [selectedHotel, setSelectedHotel] = React.useState(null);

  const resetBasketSignature = `${offerSnapshot?.search?.destination || ''}|${offerSnapshot?.search?.city || ''}|${offerSnapshot?.search?.id || ''}|${offerSnapshot?.search?.refreshedAt || ''}|${offers.length}`;

  React.useEffect(() => {
    setCurrentStep('flights');
    setSelectedFlight(null);
    setSelectedHotel(null);
  }, [resetBasketSignature]);

  const handlePickFlight = (offer) => {
    setSelectedFlight(offer);
    setSelectedHotel(null);
    setCurrentStep('hotels');
  };

  const handlePickHotel = (offer) => {
    setSelectedHotel(offer);
    setCurrentStep('summary');
  };

  const handleBack = () => {
    if (currentStep === 'hotels') {
      setCurrentStep('flights');
      setSelectedFlight(null);
      setSelectedHotel(null);
      return;
    }
    if (currentStep === 'summary') {
      setCurrentStep('hotels');
      setSelectedHotel(null);
    }
  };

  const showBack = currentStep !== 'flights';

  const sectionTitle =
    currentStep === 'flights' ? 'Tria el teu vol' :
    currentStep === 'hotels' ? 'Tria el teu allotjament' :
    'Itinerari desat a la teva selecció';

  if (isLoading) {
    return (
      <div style={{ margin: '16px 16px 0', padding: 18, background: '#fff', borderRadius: 24, border: '1px solid var(--border)', boxShadow: 'var(--shadow-md)' }}>
        <div className="micro" style={{ marginBottom: 10 }}>CONSTRUEIX EL VIATGE</div>
        <TravelBasketStepDots step="flights" />
        <LoadingSkeletonSection title="Flights" />
      </div>
    );
  }

  if (hasError) {
    return (
      <div style={{ margin: '16px 16px 0', padding: 18, background: '#fff', borderRadius: 24, border: '1px solid var(--border)', boxShadow: 'var(--shadow-md)' }}>
        <div className="micro" style={{ marginBottom: 10 }}>CONSTRUEIX EL VIATGE</div>
        <div style={{ padding: 18, borderRadius: 18, background: 'var(--coral-subtle)', border: '1px solid rgba(240,90,53,0.18)' }}>
          <div style={{ fontWeight: 800, fontFamily: 'var(--font-display)', fontSize: 18, letterSpacing: '-0.02em' }}>
            No hem pogut carregar les ofertes
          </div>
          <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 6 }}>
            {offerLoadError || 'Revisa el filtre de destinació o torna-ho a intentar en uns segons.'}
          </div>
        </div>
      </div>
    );
  }

  if (!hotels.length && !flights.length) {
    return (
      <div style={{ margin: '16px 16px 0', padding: 18, background: '#fff', borderRadius: 24, border: '1px solid var(--border)', boxShadow: 'var(--shadow-md)' }}>
        <div className="micro" style={{ marginBottom: 10 }}>CONSTRUEIX EL VIATGE</div>
        <div style={{ padding: 18, borderRadius: 18, background: 'var(--surface-2)', border: '1px solid var(--border)' }}>
          <div style={{ fontWeight: 700, fontFamily: 'var(--font-display)', fontSize: 18, letterSpacing: '-0.02em' }}>
            Encara estem preparant les ofertes
          </div>
          <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 6 }}>
            Quan el refresc acabi, podràs triar primer un vol i després un hotel pas a pas.
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ margin: '16px 16px 0', padding: 18, background: '#fff', borderRadius: 24, border: '1px solid var(--border)', boxShadow: 'var(--shadow-md)' }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 10, marginBottom: 10 }}>
        <div style={{ flex: 1 }}>
          <div className="micro" style={{ marginBottom: 4 }}>CONSTRUEIX EL VIATGE</div>
          <div style={{ fontWeight: 800, fontFamily: 'var(--font-display)', fontSize: 19, letterSpacing: '-0.02em', lineHeight: 1.2 }}>
            {sectionTitle}
          </div>
        </div>
        {showBack ? (
          <button type="button" className="pl-tap" onClick={handleBack} style={{
            flexShrink: 0, padding: '8px 12px', borderRadius: 9999,
            border: '1px solid var(--border)', background: 'var(--surface-2)',
            fontSize: 13, fontWeight: 700, color: 'var(--text)',
          }}>
            ← Enrere
          </button>
        ) : null}
      </div>

      <TravelBasketStepDots step={currentStep} />

      {currentStep === 'flights' && (
        <>
          {!flights.length ? (
            <div style={{ padding: 14, borderRadius: 18, background: 'var(--surface-2)', border: '1px solid var(--border)', fontSize: 13.5, color: 'var(--text-muted)' }}>
              No hem trobat vols disponibles ara mateix per aquesta combinació de dates i destinació.
            </div>
          ) : (
            <OffersSection
              title="Vols disponibles"
              accent="var(--coral)"
              count={flights.length}
              emptyText="Sense vols ara mateix."
            >
              {flights.map((offer, index) => (
                <FlightOfferCard
                  key={`${offer.id || offer.title || 'flight'}-${index}`}
                  offer={offer}
                  pickMode
                  onPick={handlePickFlight}
                />
              ))}
            </OffersSection>
          )}
        </>
      )}

      {currentStep === 'hotels' && selectedFlight && (
        <>
          <div style={{ marginBottom: 12, padding: 12, borderRadius: 16, border: '1px solid var(--border)', background: 'var(--surface-2)' }}>
            <div className="micro" style={{ color: 'var(--coral)' }}>VOL TRIAT</div>
            <div style={{ marginTop: 6, fontWeight: 700, fontSize: 14 }}>{selectedFlight.title}</div>
            <div style={{ fontSize: 12.5, color: 'var(--text-muted)', marginTop: 2 }}>
              {formatMoney(selectedFlight.price, selectedFlight.currency)} · pots canviar-lo amb «Enrere»
            </div>
          </div>
          {!hotels.length ? (

// === app.jsx ===
// PLAIner — App router (in-app state machine)
// Manages: route ('login' | 'search' | 'generating' | 'trips' | 'detail'), user, trips

function PLAIerApp({ initialRoute = 'login', initialTab = 'trips' }) {
  const [route, setRoute] = React.useState(initialRoute);
  const [user, setUser] = React.useState(null);
  const [trips, setTrips] = React.useState(SAMPLE_TRIPS);
  const [pendingParams, setPendingParams] = React.useState(null);
  const [openTrip, setOpenTrip] = React.useState(null);
  const [bottomTab, setBottomTab] = React.useState(initialTab);
  const [offerSnapshot, setOfferSnapshot] = React.useState(null);
  const [offerLoadError, setOfferLoadError] = React.useState(null);
  const [offerLoading, setOfferLoading] = React.useState(false);

  async function loadLiveOffers(params) {
    const destinationCity = params?.destination?.city || params?.destination?.name || params?.destination?.country || 'Lisbon';
    const countryCode = params?.destination?.countryCode || params?.destination?.country_code || undefined;
    const startDate = params?.dates?.start;
    const endDate = params?.dates?.end;

    if (!destinationCity || !startDate || !endDate) {
      setOfferLoadError('No hi ha prou dades per carregar ofertes reals.');
      setOfferLoading(false);
      return;
    }

    setOfferLoading(true);
    setOfferLoadError(null);

    const requestedCurrency = String(params.currency || params.userCurrency || 'EUR').toUpperCase().slice(0, 3);

    const requestUrl = new URL('/api/travel-offers', window.location.origin);
    requestUrl.searchParams.set('destination', destinationCity);
    requestUrl.searchParams.set('city', destinationCity);
    if (countryCode) requestUrl.searchParams.set('countryCode', countryCode);
    requestUrl.searchParams.set('startDate', startDate.toISOString().slice(0, 10));
    requestUrl.searchParams.set('endDate', endDate.toISOString().slice(0, 10));
    requestUrl.searchParams.set('people', String(params.people || 2));
    if (params.origin) requestUrl.searchParams.set('origin', String(params.origin));
    requestUrl.searchParams.set('budgetMax', String(params.budget || 1200));
    requestUrl.searchParams.set('maxPrice', String((params.maxPrice ?? params.budget) || 1200));
    requestUrl.searchParams.set('currency', requestedCurrency);

    try {
      const response = await fetch(requestUrl.toString());
      const payload = await response.json().catch(() => null);
      // If we have a cache with offers, use it
      if (response.ok && payload?.cache && Array.isArray(payload.cache.offers) && payload.cache.offers.length > 0) {
        setOfferSnapshot(payload.cache);
        setOfferLoadError(null);
      } else {
        // No cached offers — trigger a refresh and retry
        try {
          const postRes = await fetch('/api/travel-offers/refresh', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ query: {
              destination: destinationCity,
              city: destinationCity,
              countryCode: countryCode || undefined,
              startDate: startDate.toISOString().slice(0,10),
              endDate: endDate.toISOString().slice(0,10),
              people: params.people || 2,
              budgetMax: params.budget || 1200,
              maxPrice: (params.maxPrice ?? params.budget) || 1200,
              currency: requestedCurrency,
              origin: params.origin || undefined,
            } }),
          });
          const postPayload = await postRes.json().catch(() => null);
          if (postRes.ok && postPayload?.cache) {
            setOfferSnapshot(postPayload.cache);
            setOfferLoadError(null);
          } else {
            setOfferSnapshot(null);
            setOfferLoadError(postPayload?.error || 'No s\'han pogut carregar les ofertes reals.');
          }
        } catch (err) {
          setOfferSnapshot(null);
          setOfferLoadError(err instanceof Error ? err.message : 'No s\'ha pogut connectar amb /api/travel-offers.');
        }
      }
    } catch (error) {
      setOfferSnapshot(null);
      setOfferLoadError(error instanceof Error ? error.message : 'No s\'ha pogut connectar amb /api/travel-offers.');
    } finally {
      setOfferLoading(false);
    }
  }

  React.useEffect(() => {
    if (initialRoute !== 'login') {
      setUser({ name: 'Joana' });
    }
  }, []);

  return (
    <div className="pl-app-host" style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }}>
      {route === 'login' && (
        <LoginScreen onAuth={(u) => { setUser(u); setRoute('search'); }}/>
      )}
      {route === 'search' && (
        <SearchScreen
          user={user}
          onGenerate={(p) => { setPendingParams(p); setRoute('generating'); }}
        />
      )}
      {route === 'generating' && (
        <GeneratingScreen
          params={pendingParams}
          onDone={() => {
            // Insert new trip at top
            const p = pendingParams;
            const newTrip = {
              id: 't' + Date.now(),
              destId: p.destination.id,
              city: p.destination.city,
              country: p.destination.country,
              start: `${p.dates.start.getDate()} ${monthAbbr(p.dates.start)}`,
              end: `${p.dates.end.getDate()} ${monthAbbr(p.dates.end)}`,
              days: p.dates.days,
              people: p.people,
              total: Math.round(p.budget * p.people * 0.96),
              status: 'upcoming',
              favorite: false,
              img: p.destination.img,
            };
            setTrips([newTrip, ...trips]);
            void loadLiveOffers(p);
            setBottomTab('trips');
            setRoute('trips');
            setPendingParams(null);
          }}
        />
      )}
      {route === 'trips' && (
        <TripsScreen
          trips={trips}
          offerSnapshot={offerSnapshot}
          offerLoadError={offerLoadError}
          offerLoading={offerLoading}
          tab={bottomTab}
          onAdd={() => { setBottomTab('search'); setRoute('search'); }}
          onTab={(id) => { setBottomTab(id); if (id === 'search') setRoute('search'); }}
          onOpen={(t) => { setOpenTrip(t); setRoute('detail'); }}
        />
      )}
      {route === 'detail' && openTrip && (
        <TripDetail trip={openTrip} onBack={() => { setRoute('trips'); setOpenTrip(null); }}/>
      )}
    </div>
  );
}
